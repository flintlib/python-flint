name: Build Pyodide

on: [push, pull_request]

jobs:
  build_wheels:
    name: Build Pyodide wheel
    runs-on: ubuntu-22.04
    env:
      # This needs to be kept in sync with pyodide-version in pyproject.toml
      EMSCRIPTEN_VERSION: 4.0.9
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Emscripten toolchain
        uses: mymindstorm/setup-emsdk@6ab9eb1bda2574c4ddb79809fc9247783eaf9021 # v14
        with:
          version: ${{ env.EMSCRIPTEN_VERSION }}
          actions-cache-folder: emsdk-cache

      - name: Restore WASM library directory from cache
        id: cache-wasm-library-dir
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ github.workspace }}/wasm-library-dir
          key: wasm-library-dir-${{ env.EMSCRIPTEN_VERSION }}-${{ hashFiles('pyproject.toml', 'bin/cibw_before_all_pyodide.sh', 'bin/pyodide_build_dependencies.sh', 'bin/build_variables.sh') }}-0

      - name: Build wheels
        uses: pypa/cibuildwheel@298ed2fb2c105540f5ed055e8a6ad78d82dd3a7e # v3.3.1
        env:
          CIBW_PLATFORM: pyodide
          # This needs to be kept in sync with pyodide-version in pyproject.toml
          CIBW_BUILD: cp313-*

      - name: Persist WASM library directory to cache
        if: steps.cache-wasm-library-dir.outputs.cache-hit != 'true'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ github.workspace }}/wasm-library-dir
          key: wasm-library-dir-${{ env.EMSCRIPTEN_VERSION }}-${{ hashFiles('pyproject.toml', 'bin/cibw_before_all_pyodide.sh', 'bin/pyodide_build_dependencies.sh', 'bin/build_variables.sh') }}-0

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-pyodide
          path: wheelhouse/*.whl
